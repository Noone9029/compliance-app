services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daftar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daftar"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - daftar-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - daftar-redis:/data

volumes:
  daftar-postgres:
  daftar-redis:
